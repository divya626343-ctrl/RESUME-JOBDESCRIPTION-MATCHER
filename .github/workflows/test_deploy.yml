name: Resume Matcher — CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: resume-matcher
  AWS_REGION: ap-south-1        # not a secret — just a config value

jobs:

# ─── STAGE 1: TEST ───────────────────────────────────────────
  test:
    name: "Stage 1 — Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ env.PYTHON_VERSION }}-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-MiniLM-L6-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx flake8

      - name: Lint
        run: |
          flake8 . \
            --max-line-length=100 \
            --extend-ignore=E402,W503 \
            --exclude=.git,__pycache__,venv

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify Docker build
        run: docker build -t ${{ env.IMAGE_NAME }}:test .


# ─── STAGE 2: DEPLOY ─────────────────────────────────────────
  deploy:
    name: "Stage 2 — Deploy to AWS"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Deploy to EC2
        env:
          SSH_KEY:      ${{ secrets.SSH_KEY }}
          SSH_HOST:     ${{ secrets.SSH_HOST }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO:     ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key.pem ec2-user@$SSH_HOST << EOF
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

            docker stop resume-matcher || true
            docker rm   resume-matcher || true

            docker run -d \
              --name resume-matcher \
              -p 80:8000 \
              --restart unless-stopped \
              $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

            docker ps
          EOF

          rm /tmp/ssh_key.pem

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 http://${{ secrets.SSH_HOST }}/ \
            && echo "Deployment successful!" \
            || echo "Health check failed — check EC2 logs"